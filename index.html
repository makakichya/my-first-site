<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Моя галерея</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="media.css">
</head>
<body>
  <section class="gallary">
    <div class="container">
      <h1>Моя галерея</h1>
      <div class="wrapper">
        <div class="card">
          <img src="./photo1.jpg" alt="Фото 1">
          <h2>Белька</h2>
          <p>Моя киця Белькаа</p>
        </div>
        <div class="card">
          <img src="./photo2.jpg" alt="Фото 2">
          <h2>Я малюю</h2>
          <p>Малюю картину на заході в МЦ</p>
        </div>
        <div class="card">
          <img src="./photo3.jpg" alt="Фото 3">
          <h2>Волонтерство</h2>
          <p>Малюю тубус для військового</p>
        </div>
        <div class="card">
          <img src="./photo4.jpg" alt="Фото 4">
          <h2>Квітиии</h2>
          <p>Квіточки від мого бойфренда</p>
        </div>
        <div class="card">
          <img src="./photo5.jpg" alt="Фото 5">
          <h2>Реддд</h2>
          <p>Мій песик ред</p>
        </div>
        <div class="card">
          <img src="./photo6.jpg" alt="Фото 6">
          <h2>Мій будиночок</h2>
          <p>Будиночок який я будую в майнкрафті</p>
        </div>
      </div>
    </div>
  </section>
</body>

</html>
